name: Dailymotion to TikTok Publisher

# ==================== المشغلات (Triggers) ====================
on:
  # المشغل الرئيسي: كل ساعة (يمكنك تغيير التوقيت)
  schedule:
    - cron: '0 */12 * * *'  # كل ساعة عند الدقيقة 0
  
  # للتجربة اليدوية من واجهة GitHub
  workflow_dispatch:
    inputs:
      clip_number:
        description: 'رقم الجزء المطلوب نشره (اتركه فارغاً للنشر التلقائي)'
        required: false
        default: 'auto'
      channel:
        description: 'اسم القناة المحددة (اتركه فارغاً للاختيار العشوائي)'
        required: false
        default: 'random'

# ==================== المتغيرات العامة ====================
env:
  # متغيرات التوقيت
  TZ: 'Asia/Riyadh'  # التوقيت العربي
  
  # متغيرات التقطيع
  CLIP_DURATION: 180  # 3 دقائق لكل جزء
  PARTS_PER_DAY: 24   # إذا كل ساعة = 24 جزء في اليوم
  
  # متغيرات التحميل
  DOWNLOAD_TIMEOUT: 600000  # 10 دقائق للتحميل
  UPLOAD_TIMEOUT: 300000    # 5 دقائق للنشر

# ==================== المهام (Jobs) ====================
jobs:
  publish-to-tiktok:
    runs-on: ubuntu-latest
    
    # منع تشغيل أكثر من نسخة في نفس الوقت
    concurrency:
      group: tiktok-publisher
      cancel-in-progress: true
    
    steps:
      # ==================== الخطوة 1: تجهيز البيئة ====================
      - name: 📥 سحب الكود من المستودع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # جلب كل التاريخ للـ commits
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # ==================== الخطوة 2: إعداد Node.js ====================
      - name: ⚙️ إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # ==================== الخطوة 3: تثبيت الاعتماديات ====================
      - name: 📦 تثبيت الحزم المطلوبة
        run: |
          echo "📦 تثبيت الاعتماديات الأساسية..."
          npm install puppeteer-extra puppeteer-extra-plugin-stealth
          npm install node-fetch
          
          echo "✅ تم تثبيت جميع الحزم"
      
      # ==================== الخطوة 4: تثبيت أدوات النظام ====================
      - name: 🔧 تثبيت ffmpeg وأدوات المعالجة
        run: |
          echo "🔧 تحديث الحزم..."
          sudo apt-get update -qq
          
          echo "📹 تثبيت ffmpeg..."
          sudo apt-get install -y ffmpeg
          
          # التأكد من التثبيت
          echo "✅ إصدار ffmpeg:"
          ffmpeg -version | head -n 1
          
          echo "✅ إصدار ffprobe:"
          ffprobe -version | head -n 1
      
      # ==================== الخطوة 5: تثبيت متصفح Chromium ====================
      - name: 🌐 تثبيت Chromium لـ Puppeteer
        run: |
          echo "🌐 تثبيت الاعتماديات..."
          sudo apt-get install -y \
            chromium-browser \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2
          
          echo "✅ تم تثبيت Chromium"
      
      # ==================== الخطوة 6: تهيئة الملفات الأساسية ====================
      - name: 📋 تهيئة ملفات التتبع والنشر
        run: |
          echo "📋 فحص ملفات التتبع..."
          
          # إنشاء مجلد output إذا لم يكن موجوداً
          mkdir -p output
          
          # إنشاء ملف التتبع إذا لم يكن موجوداً
          if [ ! -f "published_videos.json" ]; then
            echo '{"currentVideo": null, "completedVideos": []}' > published_videos.json
            echo "✅ تم إنشاء ملف التتبع"
          else
            echo "✅ ملف التتبع موجود مسبقاً"
          fi
          
          # عرض حالة الملف للتشخيص
          echo "📊 حالة ملف التتبع الحالية:"
          cat published_videos.json | jq '.' || cat published_videos.json
      
      # ==================== الخطوة 7: تشغيل الكود الرئيسي ====================
      - name: 🚀 تشغيل بوت النشر
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          CLIP_NUMBER: ${{ github.event.inputs.clip_number || 'auto' }}
          CHANNEL: ${{ github.event.inputs.channel || 'random' }}
        run: |
          echo "🚀 بدء تشغيل بوت النشر..."
          echo "⏰ الوقت الحالي: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "📋 رقم الجزء المطلوب: $CLIP_NUMBER"
          echo "📡 القناة المحددة: $CHANNEL"
          
          # تشغيل الكود الرئيسي
          node scripts/main.js
          
          echo "✅ انتهى الكود من التنفيذ"
      
      # ==================== الخطوة 8: حفظ التغييرات ====================
      - name: 💾 حفظ التغييرات في المستودع
        if: success()
        run: |
          echo "💾 جاري حفظ التغييرات..."
          
          # إعداد git
          git config --global user.name "TikTok Bot"
          git config --global user.email "bot@tiktok-publisher.local"
          
          # إضافة الملفات المتغيرة فقط
          git add published_videos.json
          git add output/video_info.json 2>/dev/null || echo "⚠️ لا يوجد ملف video_info.json"
          
          # التحقق من وجود تغييرات
          if git diff --staged --quiet; then
            echo "✅ لا توجد تغييرات للحفظ"
          else
            echo "📝 توجد تغييرات، جاري الحفظ..."
            
            # استخراج معلومات النشر للتسجيل في commit
            VIDEO_TITLE=$(cat published_videos.json | jq -r '.currentVideo.title // "unknown"')
            PART_NUMBER=$(cat published_videos.json | jq -r '.currentVideo.nextPartToPublish // 0')
            
            git commit -m "📹 نشر $VIDEO_TITLE - الجزء $PART_NUMBER [auto]"
            git push origin HEAD:main
            
            echo "✅ تم حفظ التغييرات في المستودع"
          fi
      
      # ==================== الخطوة 9: تنظيف المساحة ====================
      - name: 🧹 تنظيف الملفات المؤقتة
        if: always()
        run: |
          echo "🧹 جاري تنظيف الملفات المؤقتة..."
          
          # حذف الفيديوهات المؤقتة لتوفير المساحة
          rm -f output/raw_video.mp4
          rm -f output/clip_current.mp4
          
          # حذف أي ملفات كبيرة أخرى
          find . -name "*.mp4" -type f -delete
          
          echo "✅ تم التنظيف"
      
      # ==================== الخطوة 10: التقارير والتشخيص ====================
      - name: 📊 عرض تقرير التشغيل
        if: always()
        run: |
          echo "========================================="
          echo "📊 تقرير التشغيل النهائي:"
          echo "⏰ وقت الانتهاء: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "📋 الملفات المتبقية:"
          ls -lah output/ 2>/dev/null || echo "  ⚠️ مجلد output فارغ"
          echo ""
          echo "📊 حالة ملف التتبع:"
          cat published_videos.json 2>/dev/null | jq '.' || echo "  ⚠️ لا يوجد ملف تتبع"
          echo "========================================="
      
      # ==================== الخطوة 11: التعامل مع الأخطاء ====================
      - name: 🚨 الإبلاغ عن الأخطاء
        if: failure()
        run: |
          echo "❌ فشل التشغيل!"
          echo "🔍 معلومات التشخيص:"
          echo "  - Node.js version: $(node --version)"
          echo "  - npm version: $(npm --version)"
          echo "  - ffmpeg version: $(ffmpeg -version 2>&1 | head -n 1)"
          echo "  - المساحة المتاحة: $(df -h . | tail -n 1)"
          echo "  - محتوى مجلد العمل:"
          ls -lah

# ==================== إعدادات متقدمة ====================
# تحديد الصلاحيات المطلوبة
permissions:
  contents: write  # للسماح بحفظ التغييرات في المستودع
  actions: read    # لقراءة حالة العمليات السابقة

# ==================== استراتيجيات التكرار ====================
# في حالة الفشل، حاول مرة أخرى بعد ساعة تلقائياً
# هذا مفيد في حال كان هناك مشكلة مؤقتة في الشبكة
