name: ReelShort Auto-Pilot Pro

on:
  workflow_dispatch:

jobs:
  mega-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
          sudo apt-get install -y ffmpeg

      - name: Save Cookies
        run: echo '${{ secrets.TIKTOK_COOKIES }}' > cookies.json

      - name: Create Pro Script
        run: |
          cat << 'EOF' > autopilot.cjs
          const { chromium } = require('playwright');
          const fs = require('fs');
          const { execSync } = require('child_process');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 800 }
            });
            const page = await context.newPage();
            
            // 1. صفحة التصنيف (Shelf)
            const shelfUrl = 'https://www.reelshort.com/ar/shelf/%D9%85%D8%AF%D8%A8%D9%84%D8%AC-short-movies-dramas-118859';

            try {
              console.log("🔍 جاري مسح صفحة المسلسلات...");
              await page.goto(shelfUrl, { waitUntil: 'networkidle' });

              // استخراج روابط المسلسلات من الـ Shelf
              const seriesLinks = await page.evaluate(() => {
                const links = Array.from(document.querySelectorAll('h2 a[href*="/movie/"]'));
                return links.map(a => 'https://www.reelshort.com' + a.getAttribute('href'));
              });

              console.log(`✅ وجدنا ${seriesLinks.length} مسلسل. سنبدأ بالمعالجة...`);

              for (const seriesUrl of seriesLinks) {
                console.log(`\n🎬 الدخول للمسلسل: ${seriesUrl}`);
                await page.goto(seriesUrl, { waitUntil: 'networkidle' });

                // استخراج الحلقات المجانية فقط
                const episodes = await page.evaluate(() => {
                  const items = Array.from(document.querySelectorAll('.EpisodePage_tabs_box__aoOUL'));
                  return items.map((el, i) => ({
                    index: i,
                    isLocked: !!el.querySelector('.EpisodePage_tabs_lock__BzrE8')
                  })).filter(ep => !ep.isLocked);
                });

                for (const ep of episodes) {
                  const tabs = await page.$$('.EpisodePage_tabs_box__aoOUL');
                  await tabs[ep.index].click();
                  await page.waitForTimeout(4000);

                  // استخراج العنوان الكامل للحلقة
                  const fullTitle = await page.evaluate(() => {
                    const h1 = document.querySelector('h1.line-clamp-2');
                    return h1 ? h1.innerText.trim() : "حلقة جديدة";
                  });

                  // استخراج رابط m3u8
                  const m3u8Url = await page.evaluate(() => {
                    const li = document.querySelector('li[url*=".m3u8"]');
                    return li ? li.getAttribute('url') : null;
                  });

                  if (m3u8Url) {
                    const fileName = `video.mp4`;
                    console.log(`📥 تحميل: ${fullTitle}`);
                    
                    try {
                      execSync(`ffmpeg -i "${m3u8Url}" -c copy -bsf:a aac_adtstoasc "${fileName}"`);
                      
                      // الرفع لتيك توك
                      await uploadToTikTok(fileName, `${fullTitle} #مسلسلات_مدبلجة #reelshort #kiro_zozo`, browser);
                      
                      fs.unlinkSync(fileName);
                      
                      console.log("⏳ انتظار ساعة قبل الحلقة القادمة (جدولة)...");
                      // ملاحظة: الأكشن سيتوقف إذا طالت المدة جداً، لذا يفضل تقليلها لـ 5 دقائق للتجربة
                      await new Promise(r => setTimeout(r, 300000)); // 5 دقائق للتجربة
                    } catch (e) {
                      await page.screenshot({ path: `error_${ep.index}.png` });
                      console.error(`❌ فشل في ${fullTitle}: ${e.message}`);
                    }
                  }
                }
              }
            } catch (err) {
              console.error("⚠️ خطأ عام: " + err.message);
            } finally {
              await browser.close();
            }
          })();

          async function uploadToTikTok(videoPath, caption, browser) {
            const uploadContext = await browser.newContext({ storageState: 'cookies.json' });
            const page = await uploadContext.newPage();
            try {
              await page.goto('https://www.tiktok.com/tiktokv/main/web/app/v2/publish', { waitUntil: 'networkidle' });
              const fileInput = await page.locator('input[type="file"]');
              await fileInput.setInputFiles(videoPath);
              
              await page.waitForSelector('.preview-v2', { timeout: 60000 });
              await page.locator('.public-DraftEditor-content').fill(caption);
              
              await page.click('button:has-text("Post")');
              console.log("🎉 تم النشر على تيك توك!");
              await page.waitForTimeout(5000);
            } catch (e) {
              await page.screenshot({ path: 'tiktok_fail.png' });
              throw e;
            } finally {
              await uploadContext.close();
            }
          }
          EOF

      - name: Run Auto-Pilot
        run: node autopilot.cjs

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Failure-Screenshots
          path: "*.png"
