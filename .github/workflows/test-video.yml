name: ReelShort Auto-Pilot Pro

on:
  workflow_dispatch:

jobs:
  mega-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4[cite: 1]

      - name: Setup Node.js
        uses: actions/setup-node@v4[cite: 1]
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm init -y[cite: 1]
          npm install playwright[cite: 1]
          npx playwright install chromium --with-deps[cite: 1]
          sudo apt-get update && sudo apt-get install -y ffmpeg[cite: 1, 2]

      - name: Save Cookies
        run: echo '${{ secrets.TIKTOK_COOKIES }}' > cookies.json

      - name: Create Pro Script
        run: |
          cat << 'EOF' > autopilot.cjs
          const { chromium } = require('playwright');
          const fs = require('fs');
          const { execSync } = require('child_process');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 800 }
            });
            const page = await context.newPage();
            
            let currentM3u8 = null;

            // تفعيل مراقبة الشبكة لاصطياد الرابط[cite: 2]
            page.on('request', request => {
              const url = request.url();
              if (url.includes('.m3u8') && !url.includes('analytics')) {
                currentM3u8 = url;
              }
            });

            const shelfUrl = 'https://www.reelshort.com/ar/shelf/%D9%85%D8%AF%D8%A8%D9%84%D8%AC-short-movies-dramas-118859';

            try {
              console.log("🔍 جاري فحص صفحة المسلسلات...");
              await page.goto(shelfUrl, { waitUntil: 'networkidle' });[cite: 2]

              const seriesLinks = await page.evaluate(() => {
                const links = Array.from(document.querySelectorAll('a[href*="/movie/"]'));
                return [...new Set(links.map(a => 'https://www.reelshort.com' + a.getAttribute('href')))];
              });

              console.log(`✅ تم العثور على ${seriesLinks.length} مسلسل.`);

              for (const seriesUrl of seriesLinks) {
                console.log(`\n🎬 الدخول للمسلسل: ${seriesUrl}`);
                await page.goto(seriesUrl, { waitUntil: 'networkidle' });[cite: 2]

                // استخراج الحلقات المجانية بناءً على النص أو الأيقونات
                const episodes = await page.evaluate(() => {
                  const items = Array.from(document.querySelectorAll('.EpisodePage_tabs_box__aoOUL'));
                  return items.map((el, i) => ({
                    index: i,
                    isLocked: !!el.querySelector('.EpisodePage_tabs_lock__BzrE8'),
                    title: el.innerText.trim()
                  })).filter(ep => !ep.isLocked);
                });

                for (const ep of episodes) {
                  currentM3u8 = null; // تصفير الرابط لكل حلقة جديدة
                  console.log(`📺 معالجة الحلقة: ${ep.title}`);
                  
                  const tabs = await page.$$('.EpisodePage_tabs_box__aoOUL');
                  await tabs[ep.index].click();
                  
                  // الانتظار حتى يظهر الرابط في الشبكة[cite: 2]
                  let retries = 0;
                  while (!currentM3u8 && retries < 10) {
                    await page.waitForTimeout(2000);
                    retries++;
                  }

                  if (currentM3u8) {
                    const fileName = `video.mp4`;
                    console.log(`📥 جاري تحميل الفيديو من الرابط المكتشف...`);
                    
                    try {
                      // تحميل باستخدام ffmpeg[cite: 2]
                      execSync(`ffmpeg -i "${currentM3u8}" -c copy -bsf:a aac_adtstoasc "${fileName}" -y`);
                      
                      console.log(`🚀 جاري الرفع لتيك توك: ${ep.title}`);
                      await uploadToTikTok(fileName, `${ep.title} #reelshort #مسلسلات_مدبلجة`, browser);
                      
                      fs.unlinkSync(fileName);
                      console.log("✅ تم النشر والحذف. انتظار 5 دقائق...");
                      await page.waitForTimeout(300000); 
                    } catch (e) {
                      console.error(`❌ خطأ في معالجة الحلقة: ${e.message}`);
                    }
                  } else {
                    console.log("⚠️ لم يتم اصطياد رابط m3u8 لهذه الحلقة.");
                  }
                }
              }
            } catch (err) {
              console.error("⚠️ خطأ عام: " + err.message);
            } finally {
              await browser.close();
            }
          })();

          async function uploadToTikTok(videoPath, caption, browser) {
            const uploadContext = await browser.newContext({ storageState: 'cookies.json' });
            const page = await uploadContext.newPage();
            try {
              await page.goto('https://www.tiktok.com/tiktokv/main/web/app/v2/publish', { waitUntil: 'networkidle' });
              const fileInput = await page.locator('input[type="file"]');
              await fileInput.setInputFiles(videoPath);
              
              await page.waitForSelector('button:has-text("Post")', { timeout: 90000 });
              await page.locator('.public-DraftEditor-content').fill(caption);
              
              await page.waitForTimeout(5000); // وقت إضافي لمعالجة الفيديو
              await page.click('button:has-text("Post")');
              console.log("🎉 تم النشر بنجاح!");
              await page.waitForTimeout(10000);
            } catch (e) {
              await page.screenshot({ path: 'tiktok_fail.png' });
              console.error("❌ فشل الرفع لتيك توك");
            } finally {
              await uploadContext.close();
            }
          }
          EOF

      - name: Run Auto-Pilot
        run: node autopilot.cjs[cite: 1]

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Failure-Screenshots
          path: "*.png"
