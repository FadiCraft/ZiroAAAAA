name: ReelShort Auto-Pilot Pro

on:
  workflow_dispatch: # يتيح لك تشغيل الكود يدوياً من تبويب Actions

permissions:
  contents: write # إعطاء صلاحية للكود لإنشاء وحذف ملفات الفيديو

jobs:
  scrape-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4[cite: 1]

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'[cite: 1]

      - name: Install System & Node Tools
        run: |
          npm init -y
          npm pkg set type="module"
          npm install playwright
          npx playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y ffmpeg[cite: 1, 2]

      - name: Run Autopilot
        run: node autopilot.js[cite: 1]
        env:
          # إذا كان الكود يحتاج لاتصال خارجي أو مفاتيح، تضعها هنا
          NODE_ENV: production
