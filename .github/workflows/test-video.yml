name: Download ReelShort Episode

on:
  workflow_dispatch: # يتيح لك تشغيل الأكشن يدوياً وإدخال الرابط

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download Video
        run: |
          # هنا نضع الرابط الذي يحتوي على الـ m3u8 من هيكل الصفحة
          # سأقوم باستخراج الرابط مباشرة باستخدام python من كود الـ HTML الذي زودتني به
          
          python3 -c "
          import re
          html_content = '''${{ secrets.HTML_SNIPPET }}''' # سنستخدم سكرت لتخزين الكود لتجنب مشاكل الرموز
          match = re.search(r'url=\"(https?://[^\"]+\.m3u8)\"', html_content)
          if match:
              print(match.group(1))
          else:
              print('No URL found')
          " > video_url.txt

          VIDEO_URL=$(cat video_url.txt)
          
          if [ "$VIDEO_URL" != "No URL found" ]; then
            echo "Downloading: $VIDEO_URL"
            yt-dlp -o "episode_1.mp4" "$VIDEO_URL"
          else
            echo "Failed to extract M3U8 URL"
            exit 1
          fi

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reelshort-video
          path: episode_1.mp4
