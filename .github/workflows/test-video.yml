name: Manual Video Uploader

on:
  workflow_dispatch: # يتيح لك التشغيل يدوياً من صفحة Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Google Chrome and FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable ffmpeg

      - name: Install Node Dependencies
        run: npm install

      - name: Run Bot
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: node index.js
