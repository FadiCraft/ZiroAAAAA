name: Download ReelShort Episode

on:
  workflow_dispatch:

jobs:
  scrape-and-download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
          sudo apt-get install -y ffmpeg

      - name: Create Extractor Script
        run: |
          cat << 'EOF' > extractor.cjs
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            // إطلاق المتصفح
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();
            
            const targetUrl = 'https://www.reelshort.com/ar/episodes/episode-1-%D8%AE%D9%8A%D8%A7%D9%86%D8%A9-%D8%A7%D9%84%D8%B9%D8%B1%D9%88%D8%B3-%D8%A8%D9%8A%D9%86-%D8%A7%D9%84%D8%B3%D9%85-%D9%88%D8%A7%D9%84%D9%81%D8%AE-6976d3d973079f59c401f6b1-fmt59elc6t?play_time=1';

            try {
              console.log("جارٍ فتح الصفحة واستخراج الرابط...");
              await page.goto(targetUrl, { waitUntil: 'networkidle', timeout: 60000 });

              // انتظار تحميل العناصر التي تحتوي على الرابط
              await page.waitForSelector('li.option-item', { timeout: 30000 });

              const videoUrl = await page.evaluate(() => {
                // البحث عن العنصر الذي يحتوي على رابط m3u8
                const item = document.querySelector('li.option-item[url*=".m3u8"]');
                return item ? item.getAttribute('url') : null;
              });

              if (videoUrl) {
                console.log("تم العثور على الرابط بنجاح: " + videoUrl);
                fs.writeFileSync('video_url.txt', videoUrl);
              } else {
                console.error("لم يتم العثور على عنصر li يحتوي على رابط m3u8");
                process.exit(1);
              }
            } catch (error) {
              console.error("حدث خطأ: " + error.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Run Extraction
        run: node extractor.cjs

      - name: Download and Save Locally
        run: |
          if [ -f video_url.txt ]; then
            M3U8_URL=$(cat video_url.txt)
            echo "جارٍ التحميل من: $M3U8_URL"
            # تحميل الفيديو وحفظه باسم episode_1.mp4 في مجلد المشروع
            ffmpeg -i "$M3U8_URL" -c copy -bsf:a aac_adtstoasc "episode_1.mp4"
          else
            echo "خطأ: لم يتم العثور على ملف video_url.txt"
            exit 1
          fi

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReelShort-Episode-1
          path: episode_1.mp4
