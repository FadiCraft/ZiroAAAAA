name: Download ReelShort Episode
on:
  workflow_dispatch:

jobs:
  scrape-and-download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
          sudo apt-get install -y ffmpeg

      - name: Run Extraction Script
        id: extract
        run: node extractor.js

      - name: Download Video with FFmpeg
        run: |
          # سيتم قراءة الرابط من ملف مؤقت تم إنشاؤه بواسطة سكريبت JS
          M3U8_URL=$(cat video_url.txt)
          ffmpeg -i "$M3U8_URL" -c copy "episode_1.mp4"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: episode_1.mp4
