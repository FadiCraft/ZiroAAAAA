name: ReelShort Auto-Pilot Pro

on:
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
          sudo apt-get install -y ffmpeg

      - name: Create Autopilot Script
        run: |
          cat << 'EOF' > autopilot.js
          import { chromium } from 'playwright';
          import fs from 'fs';
          import { execSync } from 'child_process';

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();
            
            const shelfUrl = 'https://www.reelshort.com/ar/shelf/%D9%85%D8%AF%D8%A8%D9%84%D8%AC-short-movies-dramas-118859';

            try {
              console.log("🔍 جاري مسح صفحة الرف...");
              await page.goto(shelfUrl, { waitUntil: 'networkidle' });

              const seriesLinks = await page.evaluate(() => {
                return Array.from(document.querySelectorAll('h2 a[href*="/movie/"]'))
                            .map(a => 'https://www.reelshort.com' + a.getAttribute('href'));
              });

              console.log(`✅ وجدنا ${seriesLinks.length} مسلسل.`);

              for (const url of seriesLinks) {
                console.log(`🎬 الدخول للمسلسل: ${url}`);
                await page.goto(url, { waitUntil: 'domcontentloaded' });
                
                // انتظار ظهور كلاس الحلقات لضمان التحميل
                try {
                  await page.waitForSelector('.EpisodePage_tabs_box__aoOUL', { timeout: 10000 });
                } catch (e) {
                  console.log("⚠️ لم يتم العثور على حلقات في هذا الرابط، تخطي...");
                  continue;
                }

                const episodes = await page.evaluate(() => {
                  return Array.from(document.querySelectorAll('.EpisodePage_tabs_box__aoOUL'))
                    .map((el, i) => ({
                      index: i,
                      isLocked: !!el.querySelector('.EpisodePage_tabs_lock__BzrE8'),
                      title: el.innerText.trim()
                    })).filter(ep => !ep.isLocked);
                });

                console.log(`📺 متاح ${episodes.length} حلقة مجانية.`);

                for (const ep of episodes) {
                  const tabs = await page.$$('.EpisodePage_tabs_box__aoOUL');
                  await tabs[ep.index].click();
                  await page.waitForTimeout(5000); // وقت لتحميل الفيديو

                  // استخراج العنوان الكامل من h1
                  const fullTitle = await page.evaluate(() => {
                    const h1 = document.querySelector('h1.line-clamp-2');
                    return h1 ? h1.innerText.trim() : "حلقة جديدة";
                  });

                  const m3u8 = await page.evaluate(() => {
                    const li = document.querySelector('li[url*=".m3u8"]');
                    return li ? li.getAttribute('url') : null;
                  });

                  if (m3u8) {
                    console.log(`📥 تحميل: ${fullTitle}`);
                    const output = 'video.mp4';
                    try {
                      execSync(`ffmpeg -i "${m3u8}" -c copy -bsf:a aac_adtstoasc ${output}`);
                      
                      // الرفع (هنا تضع كود الرفع الخاص بك لتيك توك)
                      console.log(`🚀 جاهز للرفع: ${fullTitle}`);
                      
                      // مسح الملف لتوفير مساحة
                      if (fs.existsSync(output)) fs.unlinkSync(output);
                      
                      // انتظار بسيط بين الحلقات
                      await new Promise(r => setTimeout(r, 10000));
                    } catch (err) {
                      console.error("❌ خطأ FFmpeg:", err.message);
                    }
                  }
                }
              }
            } catch (err) {
              console.error("❌ خطأ كلي:", err.message);
              await page.screenshot({ path: 'error.png' });
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Run Autopilot
        run: node autopilot.js
