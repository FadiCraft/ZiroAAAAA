name: ReelShort Mega Bot

on:
  workflow_dispatch:

jobs:
  mega-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4[cite: 1]

      - name: Setup Node.js
        uses: actions/setup-node@v4[cite: 1]
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install playwright[cite: 1]
          npx playwright install chromium --with-deps[cite: 1]
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Create Autopilot Script
        run: |
          cat << 'EOF' > autopilot.cjs
          const { chromium } = require('playwright');
          const fs = require('fs');
          const { execSync } = require('child_process');

          (async () => {
            // تشغيل المتصفح مع محاكاة مستخدم حقيقي[cite: 1, 2]
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();
            
            let capturedM3u8 = null;

            // مراقبة الشبكة فوراً لاصطياد أي ملف m3u8[cite: 2]
            page.on('request', req => {
              const url = req.url();
              if (url.includes('.m3u8') && !url.includes('google-analytics')) {
                capturedM3u8 = url;
                console.log("🎯 تم صيد الرابط بنجاح!");
              }
            });

            const shelfUrl = 'https://www.reelshort.com/ar/shelf/%D9%85%D8%AF%D8%A8%D9%84%D8%AC-short-movies-dramas-118859';

            try {
              console.log("🔍 الدخول لصفحة المسلسلات...");
              await page.goto(shelfUrl, { waitUntil: 'networkidle' });[cite: 2]

              // استخراج روابط المسلسلات[cite: 2]
              const seriesLinks = await page.evaluate(() => {
                const anchors = Array.from(document.querySelectorAll('a[href*="/movie/"]'));
                return [...new Set(anchors.map(a => a.href))];
              });

              for (const url of seriesLinks) {
                console.log(`🎬 فتح المسلسل: ${url}`);
                capturedM3u8 = null;
                
                await page.goto(url, { waitUntil: 'domcontentloaded' });[cite: 2]
                await page.waitForTimeout(5000); 

                // الضغط على أول حلقة متاحة لتفعيل المشغل[cite: 2]
                await page.click('[class*="EpisodePage_tabs_box"]', { timeout: 5000 }).catch(() => {});

                // انتظار صيد الرابط من الشبكة لمدة 15 ثانية
                for (let i = 0; i < 15; i++) {
                  if (capturedM3u8) break;
                  await page.waitForTimeout(1000);
                }

                if (capturedM3u8) {
                  const videoFile = `video_${Date.now()}.mp4`;
                  console.log("📥 جاري تحويل البث إلى mp4...");
                  
                  try {
                    // التحويل باستخدام ffmpeg
                    execSync(`ffmpeg -i "${capturedM3u8}" -c copy -bsf:a aac_adtstoasc "${videoFile}" -y`, { stdio: 'inherit' });
                    console.log(`✅ الملف جاهز: ${videoFile}`);
                    
                    // هنا تضع كود الرفع الخاص بك (uploadToTikTok)[cite: 1]
                    
                    if (fs.existsSync(videoFile)) fs.unlinkSync(videoFile);
                  } catch (ffmpegErr) {
                    console.error("❌ فشل FFmpeg.");
                  }
                } else {
                  console.log("⚠️ فشل العثور على رابط m3u8 (قد تكون الحلقة مدفوعة).");
                }
                console.log("---");
              }
            } catch (err) {
              console.error("❌ خطأ عام: " + err.message);
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Run Script
        run: node autopilot.cjs[cite: 1]
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
